# version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:  # Ensures ready
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "root", "mysql"]
      timeout: 30s
      retries: 5
      start_period: 40s  # MySQL init ~30s
  app:
    build: .
    ports:
      - "8002:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: mysql
  nginx:
    image: nginx:alpine
    ports:
      - "8003:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
  
volumes:
  mysql_data:
